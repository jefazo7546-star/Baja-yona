<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Contador de días restantes</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background-color: #111;
      color: #eee;
      text-align: center;
      margin-top: 100px;
    }
    h1 {
      font-size: 2em;
    }
    #contador {
      font-size: 3em;
      margin-top: 20px;
    }
  </style>
</head>
<body>
  <h1> Días para irme de baja palapinga </h1>
  <div id="contador"></div>


  <script>
    // Fecha objetivo (ejemplo: 31 diciembre 2026)
    const fechaObjetivo = new Date("August 27, 2027 00:00:00").getTime();

    function actualizarContador() {
      const ahora = new Date().getTime();
      const diferencia = fechaObjetivo - ahora;

      const dias = Math.floor(diferencia / (1000 * 60 * 60 * 24));

      document.getElementById("contador").innerText = dias + " días";
    }

    actualizarContador();
    setInterval(actualizarContador, 1000 * 60 * 60); // actualiza cada hora
  </script>
</body>
</html>
